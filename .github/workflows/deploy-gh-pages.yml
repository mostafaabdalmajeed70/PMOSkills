name: Deploy PMOSkills Web Explorer to GitHub Pages

on:
  push:
    branches:
      - main
      - website
    paths:
      - 'website/**'
      - 'sdk/npm/src/db/store.json'
      - '.github/workflows/deploy-gh-pages.yml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'website/package-lock.json'

      - name: Install dependencies
        run: |
          cd website
          npm ci

      - name: Build Web Explorer
        run: |
          cd website
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: website/dist
          branch: gh-pages
          clean: true
